	name: Build and Push Docker Image to Aliyun ACR
	on:
	  push:
	    branches:
	      - main
	  workflow_dispatch:
	env:
	  PLATFORMS: linux/amd64
	  IMAGE_NAME: kylin-offline-package
	jobs:
	  build-and-push:
	    runs-on: ubuntu-latest
	    steps:
	      - name: Checkout code
	        uses: actions/checkout@v4
	      - name: Free disk space
	        run: |
	          echo "清理前磁盘状态："
	          df -hT
	          sudo rm -rf /usr/share/dotnet
	          sudo rm -rf /usr/local/lib/android/sdk
	          sudo rm -rf /opt/ghc
	          docker system prune -af --volumes
	          echo "清理后磁盘状态："
	          df -hT
	      - name: Set up QEMU
	        uses: docker/setup-qemu-action@v3
	      - name: Set up Docker Buildx
	        uses: docker/setup-buildx-action@v3
	      - name: Login to Aliyun ACR
	        uses: docker/login-action@v3
	        with:
	          registry: ${{ secrets.ALIYUN_REGISTRY }}
	          username: ${{ secrets.ALIYUN_USERNAME }}
	          password: ${{ secrets.ALIYUN_PASSWORD }}
	      - name: Build and push Docker image
	        uses: docker/build-push-action@v5
	        with:
	          context: .
	          file: ./kylin/Dockerfile.arm64
	          platforms: ${{ env.PLATFORMS }}
	          push: true
	          tags: |
	            ${{ secrets.ALIYUN_REGISTRY }}/${{ secrets.ALIYUN_NAMESPACE }}/${{ env.IMAGE_NAME }}:v10_sp2
	            ${{ secrets.ALIYUN_REGISTRY }}/${{ secrets.ALIYUN_NAMESPACE }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
	      - name: Clean up docker resources
	        if: always()
	        run: |
	          docker builder prune -af
	          docker image prune -af
	          docker system prune -af
	          df -hT